<script>
// Define dataLayer and the gtag function.
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}

// Default ad_storage to 'denied' as a placeholder
// Determine actual values based on your own requirements
gtag('consent', 'default', {
  'ad_storage': 'denied',
  'analytics_storage': 'denied'
});
</script>

<!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src='https://www.googletagmanager.com/gtag/js?id=G-S28X368HT7'></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

    gtag('js', new Date());

  gtag('config', 'G-S28X368HT7');

/*
The custom trackers below can be tailored to match the inputs used in your
dashboard.
*/

  $(document).on('change', 'select#dropdown_academicyr', function(e) {
    gtag('event', 'Academic year', {'event_category' : 'Academic year',
    'event_label' : document.querySelector('select#dropdown_academicyr').value
    });
  });

  $(document).on('change', 'select#dropdown_subject', function(e) {
    gtag('event', 'Subject', {'event_category' : 'Subject',
    'event_label' : document.querySelector('select#dropdown_subject').value
    });
  });

  $(document).on('change', 'select#dropdown_sex', function(e) {
    gtag('event', 'Sex', {'event_category' : 'Sex',
    'event_label' : document.querySelector('select#dropdown_sex').value
    });
  });

  $(document).on('click', 'ul#navlistPanel', function(e) {
    gtag('event', 'navlistPanel', {'event_category' : 'navbar click',
    'event_label' : document.querySelector(
    'ul#navlistPanel > li.active > a'
    ).getAttribute('data-value')
    });
  });

  $(document).on('click', 'a#download_data', function(e) {
    gtag('event', 'Download button', {'event_category' : 'Download button click'
    });
  });

  $(document).on('shiny:disconnected', function(e) {
    gtag('event', 'disconnect', {
      'event_label' : 'Disconnect',
      'event_category' : 'Disconnect'
    });
  });

</script>
